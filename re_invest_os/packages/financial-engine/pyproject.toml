[project]
name = "re-engine"
version = "0.1.0"
description = "re_invest_os 計算エンジン: CF/税/融資/IRR/DSCR/スコア/最大買付価格 の純粋関数群"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9.0",
    "numpy>=2.0.0",
    "numpy-financial>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/re_engine"]
