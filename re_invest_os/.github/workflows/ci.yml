name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (financial-engine + api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Pytest (financial-engine + api)
        run: uv run pytest -q

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install (npm)
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: node_modules/.bin/tsc --noEmit

      - name: Build
        run: node_modules/.bin/next build

  legal-check:
    name: Legal (NG word check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: NG word scan (user-facing files only)
        run: |
          # Exclude docs/legal/ (contains the NG word list itself by design)
          # and docs/product/blueprint_v0_1.md (lists NG words too)
          set +e
          violations=0
          for pattern in "иІ·гЃ†гЃ№гЃЌ" "еЈІг‚‹гЃ№гЃЌ" "з‹™гЃ„з›®" "зµ¶еЇѕе„ІгЃ‹г‚‹" "зўєе®џгЃ«е„ІгЃ‹"; do
            if grep -rn --include="*.tsx" --include="*.ts" --include="*.jsx" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
              "$pattern" apps/web/src/; then
              echo "::error::User-facing NG word found: $pattern"
              violations=$((violations + 1))
            fi
          done
          if [ $violations -gt 0 ]; then exit 1; fi
          echo "OK: no NG words in user-facing code"
