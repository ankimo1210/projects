[project]
name = "re-invest-os-api"
version = "0.1.0"
description = "re_invest_os API server (FastAPI)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "re-engine",
    "openai>=2.36.0",
    "httpx>=0.28.0",
    "pypdf>=5.1.0",
    "selectolax>=0.3.21",
    "python-multipart>=0.0.20",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.20.0",
    "anthropic>=0.50.0",
    "python-dotenv>=1.0.0",
]

[tool.uv.sources]
re-engine = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "reportlab>=4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
