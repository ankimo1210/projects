# ---- CG-update window criteria ---------------------------------------
# CGCALC (LUNAR_LANDING_GUIDANCE_EQUATIONS.agc:651-698) updates the
# guidance frame only while TCGF + TTF/8 < 0 < TCGI + TTF/8. Real
# Apollo 11 values are not in the vendor tree; -1 / +max holds the window
# open for the whole descent, which is what the ignition algorithm needs
# (CG must erect on the first pass, else RGU stays in SM axes and DDUM
# diverges). ASSUMED — revisit if P64+ phase switching ever misbehaves.

[[word]]
symbol = "TCGFBRAK"
octal = "77776"
provenance = "assumed"
comment = "-1: never freeze the guidance frame (braking)"

[[word]]
symbol = "TCGIBRAK"
octal = "37777"
provenance = "assumed"
comment = "+max: window open from TTF/8 = 0 (braking)"

[[word]]
symbol = "TCGFAPPR"
octal = "77776"
provenance = "assumed"
comment = "-1: never freeze the guidance frame (approach)"

[[word]]
symbol = "TCGIAPPR"
octal = "37777"
provenance = "assumed"
comment = "+max: window open (approach)"

