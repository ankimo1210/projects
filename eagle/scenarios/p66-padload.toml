# Spike A (Task 6) static pad-load: everything P63 -> ignition needs that
# is NOT time-dependent. Time-dependent words (permanent LM/CSM state
# vectors, RLS, REFSMMAT, TLAND) are regenerated live from the measured
# AGC clock by `eagle_runtime::padload::generate_state` and loaded on top.
#
# Symbols resolve against build/agc/Luminary099.log (SymTab). The whole
# descent-target block is the EBANK-5 W-matrix overlay starting at TLAND =
# E5,1400 (ERASABLE_ASSIGNMENTS.agc:1360-1411).
#
# Value provenance: LUM69R2/PADLOADS.agc (reconstructed flown Apollo 10 LM
# erasable load) — the closest real padload in the vendor tree. Luminary
# 99 flew slightly different numbers, but these are mutually consistent
# and the geometry generator (StateCfg) is derived from THESE RIGNX/RIGNZ/
# VIGN values, so the set is self-consistent by construction. yaYUL "B-n"
# literals map to our physical b = n (DP pulses = value * 2^(28-b)); "B+m"
# maps to b = -m; a bare 2DEC fraction maps to b = 0.
#
# Deliberately omitted:
# - GAINBRAK/GAINAPPR: value unknown (not in any vendored padload; new in
#   Luminary 99). Left at cold-boot zero — with TTF/8 = 0 at IGNALG start
#   the GAINBRAK term of CGCALC's row-1 vector vanishes anyway.
# - LR position/weight block (LRALPHA..LRWVFF), V2FG, TAUVERT, DELQFIX
#   companions: landing radar stays silent in Spike A (no LR data-good
#   discretes), P65 is out of scope.
# - LEMMASS/CSMMASS: loaded through V48/N47 (R03 also derives MASS).
# - FLAGWRD8 moon bits, REFSMFLG: set via read-modify-write in the
#   choreography (a blunt manifest write would clobber live flag bits).

