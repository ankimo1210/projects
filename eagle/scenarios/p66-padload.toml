# ---- P66 rate-of-descent cluster --------------------------------------
# b-scales below are derived from the guidance-equation scale chain
# (Spike A step 0/iter 14 analysis): velocities in this file are at
# 2^10 m/cs (VIGN literal, DDUM denominator comment), accelerations at
# 2^-4 m/cs^2 (ABRFG "B+04"), MASS at 2^16 kg (HIASCENT "5050 B-16").
# Interpreter DDV/DMP keep fraction arithmetic, so:
#   TAUROD  = vel/acc     -> fraction = tau_cs / 2^14      (b=14, CENTISECONDS)
#   LAG/TAU = ratio       -> fraction = ratio              (b=0, dimensionless)
#   FORCE   = MASS * acc  -> fraction = F[kg*m/cs^2]/2^12  (b=12, kg*m/cs^2 = 1e4 N)
# None of these is exercised before ENGINE ON; Spike B (P66 live) is the
# empirical authority. RODSCALE's scale did NOT close under this chain
# (1 ft/s is sub-pulse at both 2^10 and 2^7 m/cs SP) -- task-5 value kept,
# flagged for Spike B.

[[word]]
symbol = "RODSCALE"
physical = { value = -0.3048, b = 7, dp = false }
provenance = "task-5 hypothesis (1 ft/s per click)"
comment = "ROD click scale, m/s SP b=7 -- UNVERIFIED; scale chain did not close, Spike B must pin"

[[word]]
symbol = "TAUROD"
physical = { value = 150.0, b = 14, dp = true }
provenance = "derived (scale chain); value 1.5 s = 150 cs"
