# ---- DPS throttle-up delay -------------------------------------------
# ZOOMTIME is PAD-LOADED (B(1)PL, ERASABLE_ASSIGNMENTS.agc:2109), not the
# fixed constant the comments elsewhere suggest. Left at zero, TIG-0's
# `CA ZOOMTIME / TC WAITLIST / 2CADR P63ZOOM` (BURN,_BABY,_BURN 36,2411)
# POODOOs 01204 (zero-dt waitlist) ONE INSTRUCTION before IGNITION writes
# ENGINE ON — pinned live via ALMCADR=36,2413 (spike-A iters 18-19).
# 2600 cs = the historical 26 s DPS trim-phase before throttle-up
# (matches GUIDDURN/DDUMGOOD's TIG = ignition-point - ZOOMTIME).

[[word]]
symbol = "ZOOMTIME"
octal = "05050"
provenance = "derived: 26 s = 2600 cs; caller BURN,_BABY,_BURN TIG-0 + DDUMGOOD"
comment = "DPS throttle-up delay, SP cs (2600 = 0o5050)"

