# Data source configuration. All free sources. Keys come from .env (see .env.example).
# Fallback order is honored by quantkit.data.get_prices (source="auto").

market:
  primary: stooq            # long daily OHLCV history, no key
  fallback: yfinance        # used only if primary fails (emits a warning)
  crypto: coingecko         # free, no key (price-only); binance for full OHLCV
  cache_ttl_seconds: 86400  # 1 day

sources:
  stooq:
    enabled: true
    rate_limit_s: 0.5
    note: "US tickers map to <sym>.us; JP support is limited (use yfinance fallback)."
  yfinance:
    enabled: true
    rate_limit_s: 0.0
    note: "Fallback only. Handles JP tickers like 7203.T."
  coingecko:
    enabled: true
    rate_limit_s: 2.5         # free tier is rate-limited
    api_key_env: null
  binance:
    enabled: true
    rate_limit_s: 0.5
  fred:
    enabled: true
    api_key_env: FRED_API_KEY
    note: "ALFRED vintages give exact release_date for point-in-time macro."
  ustreasury:
    enabled: true
    api_key_env: null
    note: "Daily par yield curve from treasury.gov (no key)."

# Credential-gated / Phase-2 sources (interfaces exist; not active in MVP).
planned:
  jquants: { api_key_env: [JQUANTS_REFRESH_TOKEN], note: "JP equities + fundamentals" }
  estat: { api_key_env: [ESTAT_APP_ID], note: "JP macro" }
  boj: { note: "BoJ time-series" }
  mof: { note: "JGB yields, trade balance" }
  bea: { api_key_env: [BEA_API_KEY] }
  bls: { api_key_env: [BLS_API_KEY] }
  census: { note: "US economic indicators" }
  sec_edgar: { note: "US fundamentals (company facts)" }
  edinet: { note: "JP fundamentals" }
