# Backtest configuration (Phase 2+). Cheat-proof defaults in the spirit of autostock.

execution:
  rebalance: monthly          # daily | weekly | monthly
  lag_days: 1                 # decide at close t, hold from t+1 (no same-day lookahead)
  cost_bps: 5.0               # transaction cost per unit turnover
  slippage_bps: 2.0

constraints:
  long_only: false
  max_gross: 1.0
  max_name_weight: 0.25
  max_turnover: null
  target_vol: null
  cash_min: 0.0

evaluation:
  segments: { train_end: "2018-12-31", test_start: "2019-01-01", lockbox_start: "2024-07-01" }
  annualization: 252
  benchmark: SPY
  report_failed_strategies: true   # show failures, not just the winner
  tax_aware: true                  # apply quantkit.tax drag to after-tax returns
