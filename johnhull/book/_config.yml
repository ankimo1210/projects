title: johnhull — デリバティブの数理を動かして学ぶ
author: Kazumasa
language: ja
only_build_toc_files: true

execute:
  # Notebooks are committed with their outputs already executed; keep the book
  # build fast and deterministic (same policy as the analytics books).
  execute_notebooks: "off"

sphinx:
  config:
    # require.js lets Plotly figures embedded by nbconvert render in static HTML
    # (used by the A1-A4 deep-dive notebooks).
    html_js_files:
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js

html:
  use_issues_button: false
  use_repository_button: false
