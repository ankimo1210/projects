title: "常微分方程式の風景 — 変化・流れ・場の言語(前提編: 微分積分)"
author: Kazumasa
language: ja
only_build_toc_files: true

execute:
  # Notebooks are committed with their outputs already executed
  # (see README: "Notebook の実行"). Keep the book build fast and deterministic.
  execute_notebooks: "off"

sphinx:
  config:
    # require.js lets Plotly figures embedded by nbconvert render in static HTML.
    html_js_files:
      - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js

repository:
  url: https://github.com/ankimo1210/projects
  path_to_book: analytics/differential_equation/ode-book

html:
  use_issues_button: false
  use_repository_button: false
