profile: quick
data:
  seed: 1210
  train_size: 4096
  validation_size: 1024
  test_size: 1024
  ood_size: 1024
  sampling: latin_hypercube
  bounds:
    x: [0.6, 1.4]
    tau: [0.002739726, 2.0]
    r: [-0.02, 0.10]
    q: [0.0, 0.08]
    sigma: [0.05, 0.80]
model:
  hidden_layers: 4
  hidden_units: 128
  activation: silu
  output_mode: price
  direct_greek_heads: true
training:
  device: cpu
  batch_size: 512
  epochs: 250
  learning_rate: 0.002
  weight_decay: 0.000001
  early_stopping_patience: 30
  price_weight: 2.0
  greek_weight: 1.0
  differential_weight: 1.5
  penalty_weight: 0.0
output:
  artifacts_dir: artifacts/pricing
  reports_dir: reports
  namespace: quick
